name: Python Structure Check

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
        
    - name: Lint with flake8
      run: |
        pip install flake8
        # stop the build if there are Python syntax errors or undefined names
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        # exit-zero treats all errors as warnings. The GitHub editor is 127 chars wide
        flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

    - name: Check project structure and imports
      env:
        DB_USER: ci_user
        DB_PASSWORD: ci_password
        DB_NAME: ci_db
        FOOTBALL_API_KEY: ci_key
      run: |
        export PYTHONPATH=$PYTHONPATH:$PWD
        # Prüft, ob main.py grundsätzlich importiert werden kann
        python3 -c "import src.main; print('✅ Struktur-Check erfolgreich!')"
