name: "⚽ Nightly ETL Pipeline"

# ──────────────────────────────────────────────
# Trigger: Jede Nacht um 04:00 Uhr (Europe/Berlin ≈ 02:00 UTC)
# + manueller Start über GitHub UI
# ──────────────────────────────────────────────
on:
  schedule:
    - cron: "0 2 * * *"        # 02:00 UTC = 04:00 MESZ / 03:00 MEZ
  workflow_dispatch:             # Manueller Trigger über "Run workflow"-Button

jobs:
  etl:
    name: "Run ETL Pipeline"
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      DB_USER:      ${{ secrets.DB_USER }}
      DB_PASSWORD:  ${{ secrets.DB_PASSWORD }}
      DB_NAME:      ${{ secrets.DB_NAME }}
      DB_HOST:      ${{ secrets.DB_HOST }}
      DB_PORT:      ${{ secrets.DB_PORT }}
      DB_SSLMODE:   require
      FOOTBALL_API_KEY: ${{ secrets.FOOTBALL_API_KEY }}
      PYTHONPATH:   ${{ github.workspace }}

    steps:
      # ── 1. Code auschecken ──
      - name: "📥 Checkout Repository"
        uses: actions/checkout@v4

      # ── 2. Python einrichten ──
      - name: "🐍 Setup Python 3.12"
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      # ── 3. Abhängigkeiten installieren ──
      - name: "📦 Install Dependencies"
        run: pip install --no-cache-dir -r requirements.txt

      # ── 4. Pipeline ausführen ──
      - name: "🚀 Run ETL Pipeline"
        run: python src/main.py

      # ── 5. Erfolgsmeldung ──
      - name: "✅ Pipeline Erfolgreich"
        if: success()
        run: echo "Pipeline erfolgreich abgeschlossen um $(date -u '+%Y-%m-%d %H:%M UTC')"

      # ── 6. Fehlschlag-Benachrichtigung ──
      - name: "❌ Pipeline Fehlgeschlagen"
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const issue = await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `🔴 ETL Pipeline fehlgeschlagen – ${new Date().toISOString().split('T')[0]}`,
              body: [
                '## Pipeline-Fehler',
                '',
                `**Workflow Run:** [#${context.runNumber}](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})`,
                `**Datum:** ${new Date().toISOString()}`,
                `**Branch:** ${context.ref}`,
                '',
                'Bitte den Workflow-Log prüfen und den Fehler beheben.',
              ].join('\n'),
              labels: ['bug', 'pipeline']
            });
            core.warning(`Pipeline fehlgeschlagen! Issue erstellt: #${issue.data.number}`);
